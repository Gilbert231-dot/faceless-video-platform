name: Generate Faceless Video

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic for the video story'
        required: true
        default: 'wedding betrayal best friend'
        type: string

jobs:
  generate-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg redis-server postgresql postgresql-contrib \
                                  mpg123 sox lame

      - name: Start Redis & PostgreSQL
        run: |
          sudo service redis-server start
          sudo service postgresql start

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up environment variables
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> $GITHUB_ENV
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> $GITHUB_ENV
          echo "REDDIT_CLIENT_ID=${{ secrets.REDDIT_CLIENT_ID }}" >> $GITHUB_ENV
          echo "REDDIT_CLIENT_SECRET=${{ secrets.REDDIT_CLIENT_SECRET }}" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # CACHING: video files (downloaded from Google Drive)
      # ------------------------------------------------------------
      - name: Cache downloaded videos
        uses: actions/cache@v4
        id: video-cache
        with:
          path: cached_videos
          key: video-cache-${{ hashFiles('drive_clip_manager.py') }}
          restore-keys: |
            video-cache-

      # ------------------------------------------------------------
      # CACHING: clip state (progress across runs)
      # ------------------------------------------------------------
      - name: Cache video state (clip_state.json)
        uses: actions/cache@v4
        id: state-cache
        with:
          path: clip_state.json
          key: video-state
          restore-keys: |
            video-state-

      # ------------------------------------------------------------
      # (Optional) Debug – show cached contents
      # ------------------------------------------------------------
      - name: List cached files
        run: |
          echo "--- Cached videos ---"
          ls -la cached_videos/ || echo "(none yet)"
          echo "--- State file ---"
          cat clip_state.json 2>/dev/null || echo "(no state file yet)"

      # ------------------------------------------------------------
      # RUN THE GENERATOR
      # ------------------------------------------------------------
      - name: Run the video generator
        run: |
          python -c "
          from tasks import generate_video
          result = generate_video(topic='${{ inputs.topic }}', use_reddit=False)
          print(result)
          "

      # ------------------------------------------------------------
      # COLLECT OUTPUT
      # ------------------------------------------------------------
      - name: Prepare output directory and collect videos
        run: |
          mkdir -p output
          mv final_*.mp4 output/ || echo "No final videos found"
          ls -la output/

      - name: Upload the generated videos
        uses: actions/upload-artifact@v4
        with:
          name: generated-videos
          path: output/*.mp4
          retention-days: 7
