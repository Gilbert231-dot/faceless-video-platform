name: Generate Faceless Video

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic for the video story'
        required: true
        default: 'wedding betrayal best friend'
        type: string

jobs:
  generate-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg redis-server postgresql postgresql-contrib mpg123

      - name: Start Redis & PostgreSQL
        run: |
          sudo service redis-server start
          sudo service postgresql start

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up environment variables
        run: |
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> $GITHUB_ENV
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> $GITHUB_ENV
          echo "REDDIT_CLIENT_ID=${{ secrets.REDDIT_CLIENT_ID }}" >> $GITHUB_ENV
          echo "REDDIT_CLIENT_SECRET=${{ secrets.REDDIT_CLIENT_SECRET }}" >> $GITHUB_ENV

      - name: Run the video generator
        run: |
          python -c "
          from tasks import generate_video
          result = generate_video(topic='${{ inputs.topic }}', use_reddit=False)
          print(result)
          "

      - name: Prepare output directory and collect videos
        run: |
          mkdir -p output
          # Move all final_*.mp4 files (part 1 and part 2) into output/
          mv final_*.mp4 output/ || echo "No final videos found"
          # Also move any other video if needed (optional)
          ls -la output/

      - name: Upload the generated videos
        uses: actions/upload-artifact@v4
        with:
          name: generated-videos
          path: output/*.mp4
          retention-days: 7
